version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: final-project-mysql
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_DATABASE=student_db
    volumes:
      - mysql-data:/var/lib/mysql
    restart: always

  redis:
    image: redis:7.2-alpine
    container_name: final-project-redis
    ports:
      - "6379:6379"
    restart: always

  app:
    build: .
    container_name: final-project-app
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis
    volumes:
      - ./logs:/app/logs
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/student_db?createDatabaseIfNotExist=true&zeroDateTimeBehavior=convertToNull
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=123456
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    restart: always
    develop:
      watch:
        - action: rebuild
          path: src
        - action: rebuild
          path: build.gradle

volumes:
  mysql-data:
